<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080a;--bg2:#0e1116;--bg3:#161a21;--bg4:#1c2128;
  --border:#1f2630;--border2:#2a3340;--border3:#3a4555;
  --text:#eef2f7;--text2:#8a9aab;--text3:#475568;
  --green:#00d488;--green-dim:#00d48833;
  --red:#ff5566;--red-dim:#ff556633;
  --amber:#ffb84d;--amber-dim:#ffb84d33;
  --blue:#5aa7ff;--blue-dim:#5aa7ff33;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:10}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.12em}.logo span{color:var(--amber)}
.header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#ts{font-family:var(--mono);font-size:11px;color:var(--text3)}
button{background:transparent;border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 16px;border-radius:4px;cursor:pointer;letter-spacing:.05em;transition:all .15s}
button:hover{border-color:var(--amber);color:var(--amber)}
button.primary{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
#sb{padding:8px 24px;font-family:var(--mono);font-size:11px;color:var(--text2);min-height:30px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg3)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot.ld{background:var(--amber);animation:pulse 1.2s infinite}
.dot.ok{background:var(--green)}.dot.er{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#period-bar{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#period-bar .lbl{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-right:4px}
.pbtn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer;letter-spacing:.05em}
.pbtn:hover{border-color:var(--amber);color:var(--amber)}
.pbtn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
main{padding:24px;display:flex;flex-direction:column;gap:32px;max-width:1600px;margin:0 auto}
.patrimony{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border2);border-radius:10px;padding:20px 24px}
.pat-label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.pat-main{display:flex;align-items:baseline;gap:24px;flex-wrap:wrap}
.pat-value{font-family:var(--mono);font-size:34px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.pat-change{font-family:var(--mono);font-size:14px;font-weight:500}
.pat-detail{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:10px}
.section{}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.section-label{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--text2);text-transform:uppercase;font-weight:500}
.section-commentary{font-size:12px;color:var(--text3);font-style:italic;max-width:60%;text-align:right}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-bottom:16px}
.tile{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .2s}
.tile:hover{border-color:var(--border3)}
.tl{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.1em;margin-bottom:8px;text-transform:uppercase}
.tv{font-family:var(--mono);font-size:19px;font-weight:500;color:var(--text);line-height:1;letter-spacing:-.01em}
.tc{font-family:var(--mono);font-size:12px;margin-top:7px;font-weight:500}
.up{color:var(--green)}.dn{color:var(--red)}.fl{color:var(--text3)}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:16px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.chart-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.ct{font-family:var(--mono);font-size:12px;color:var(--text);letter-spacing:.06em;font-weight:500}
.cv{font-family:var(--mono);font-size:13px;font-weight:600}
.cv-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:4px}
.cbox{position:relative;height:180px}
.news-list{display:flex;flex-direction:column;gap:8px}
.news-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.news-item:hover{border-color:var(--border3)}
.news-head{padding:12px 16px;display:flex;gap:14px;cursor:pointer;align-items:flex-start}
.news-num{font-family:var(--mono);font-size:10px;color:var(--amber);padding-top:3px;flex-shrink:0;width:22px}
.news-main{flex:1;min-width:0}
.news-title{font-size:13.5px;color:var(--text);line-height:1.45;font-weight:500}
.news-title a{color:inherit;text-decoration:none}
.news-title a:hover{color:var(--amber)}
.news-meta{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:5px;display:flex;gap:10px;align-items:center}
.news-cat{padding:2px 8px;border-radius:3px;font-size:9px;letter-spacing:.05em}
.news-cat.Energy{background:var(--amber-dim);color:var(--amber)}
.news-cat.Macro\/Equity{background:var(--blue-dim);color:var(--blue)}
.news-toggle{font-family:var(--mono);font-size:11px;color:var(--text3);padding-top:2px;cursor:pointer;flex-shrink:0;user-select:none}
.news-body{max-height:0;overflow:hidden;transition:max-height .25s ease;padding:0 16px}
.news-body.open{max-height:300px;padding:0 16px 14px 52px}
.news-desc{font-size:12px;color:var(--text2);line-height:1.6}
.news-link{font-family:var(--mono);font-size:10px;color:var(--amber);text-decoration:none;display:inline-block;margin-top:8px}
.news-link:hover{text-decoration:underline}
.sk{background:var(--bg3);border-radius:3px;animation:sk 1.5s infinite}
@keyframes sk{0%,100%{opacity:.4}50%{opacity:.8}}
.eb{background:rgba(255,85,102,.08);border:1px solid rgba(255,85,102,.25);border-radius:6px;padding:14px 18px;color:var(--red);font-family:var(--mono);font-size:11px}
@media(max-width:700px){
  .section-commentary{max-width:100%;text-align:left}
  .pat-value{font-size:26px}
  main{padding:16px}
}
</style>
</head>
<body>
<header>
  <div class="logo">MARKET<span>//</span>DASHBOARD</div>
  <div class="header-right">
    <div id="ts">— not loaded —</div>
    <div id="age" class="fl" style="font-family:var(--mono);font-size:11px"></div>
    <button class="primary" onclick="loadData()">↻ RELOAD</button>
  </div>
</header>
<div id="sb"><div class="dot ld" id="dot"></div><span id="stxt">Loading data…</span></div>
<div id="period-bar">
  <span class="lbl">Change period</span>
  <button class="pbtn active" data-p="1D" onclick="setPeriod('1D')">1D</button>
  <button class="pbtn" data-p="MTD" onclick="setPeriod('MTD')">MTD</button>
  <button class="pbtn" data-p="QTD" onclick="setPeriod('QTD')">QTD</button>
  <button class="pbtn" data-p="YTD" onclick="setPeriod('YTD')">YTD</button>
  <button class="pbtn" data-p="2Y" onclick="setPeriod('2Y')">2Y</button>
  <span id="ref-date" style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:12px"></span>
</div>
<main id="main">
  <div id="patrimony-wrap"></div>
  <div id="sections-wrap"></div>
  <div class="section">
    <div class="section-head"><div class="section-label">Headlines — energy &amp; macro</div></div>
    <div class="news-list" id="news"></div>
  </div>
</main>
<script>
let CURRENT_DATA = null;
let CURRENT_PERIOD = '1D';
let CHART_INSTANCES = {};
let CHART_SPAN = '1y';

function st(msg, s) {
  document.getElementById('stxt').textContent = msg;
  const d = document.getElementById('dot');
  d.className = 'dot' + (s==='ld'?' ld':s==='ok'?' ok':s==='er'?' er':'');
}
function dataAge(updatedStr) {
  if (!updatedStr) return '';
  const m = updatedStr.match(/(\d+) (\w+) (\d+) (\d+):(\d+) UTC/);
  if (!m) return '';
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const updated = Date.UTC(+m[3], months[m[2]], +m[1], +m[4], +m[5]);
  const ageMin = Math.floor((Date.now() - updated) / 60000);
  if (ageMin < 1) return 'just now';
  if (ageMin < 60) return ageMin + ' min ago';
  const h = Math.floor(ageMin/60);
  const mm = ageMin % 60;
  return h + 'h ' + mm + 'm ago';
}

function ageClass(updatedStr) {
  if (!updatedStr) return 'fl';
  const m = updatedStr.match(/(\d+) (\w+) (\d+) (\d+):(\d+) UTC/);
  if (!m) return 'fl';
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const updated = Date.UTC(+m[3], months[m[2]], +m[1], +m[4], +m[5]);
  const ageMin = Math.floor((Date.now() - updated) / 60000);
  if (ageMin < 30)  return 'up';      // verde
  if (ageMin < 90)  return 'fl';      // grigio
  return 'dn';                        // rosso se >1h30
}
function fmt(n, dec=2) {
  if (n == null || isNaN(n)) return '—';
  return n.toLocaleString('en-GB', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}

function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  const s = n > 0 ? '+' : '';
  return s + n.toFixed(2) + '%';
}

function pctClass(n) {
  if (n == null) return 'fl';
  return n > 0 ? 'up' : n < 0 ? 'dn' : 'fl';
}

function tileHtml(inst, period) {
  const chg = inst.changes ? inst.changes[period] : null;
  const cls = pctClass(chg);
  const val = inst.current;
  const valStr = typeof val === 'number'
    ? val.toLocaleString('en-GB', {minimumFractionDigits: inst.decimals || 2, maximumFractionDigits: inst.decimals || 2})
    : val;
  return `<div class="tile">
    <div class="tl">${inst.label}</div>
    <div class="tv">${valStr}</div>
    <div class="tc ${cls}">${fmtPct(chg)}</div>
  </div>`;
}

function drawChart(id, inst) {
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  if (CHART_INSTANCES[id]) CHART_INSTANCES[id].destroy();
  const series = CHART_SPAN === '2y' ? inst.series_2y : inst.series_1y;
  if (!series || !series.values || !series.values.length) return;
  const chg1y = inst.changes?.YTD ?? inst.changes?.['1D'] ?? 0;
  const col = chg1y >= 0 ? '#00d488' : '#ff5566';
  CHART_INSTANCES[id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: series.labels,
      datasets: [{
        data: series.values,
        borderColor: col,
        borderWidth: 1.8,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: col,
        tension: 0.3,
        fill: true,
        backgroundColor: c => {
          const g = c.chart.ctx.createLinearGradient(0, 0, 0, 180);
          g.addColorStop(0, col + '55');
          g.addColorStop(1, col + '00');
          return g;
        }
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0e1116',
          borderColor: '#2a3340',
          borderWidth: 1,
          titleColor: '#eef2f7',
          bodyColor: '#eef2f7',
          titleFont: { family: 'IBM Plex Mono', size: 11 },
          bodyFont: { family: 'IBM Plex Mono', size: 12, weight: 'bold' },
          padding: 10,
          displayColors: false,
          callbacks: {
            label: c => ' ' + c.parsed.y?.toLocaleString('en-GB', {maximumFractionDigits: 4})
          }
        }
      },
      scales: {
        x: {
          display: true,
          grid: { display: false },
          ticks: { color: '#475568', font: { family: 'IBM Plex Mono', size: 9 }, maxTicksLimit: 6, autoSkip: true }
        },
        y: {
          display: true,
          position: 'right',
          grid: { color: '#1f2630', drawBorder: false },
          ticks: { color: '#475568', font: { family: 'IBM Plex Mono', size: 9 }, maxTicksLimit: 5, callback: v => v.toLocaleString('en-GB', {maximumFractionDigits: 2}) },
          grace: '5%'
        }
      }
    }
  });
}

function renderSection(key, title, secData, period) {
  if (!secData || !secData.instruments?.length) return '';
  const tiles = secData.instruments.map(i => tileHtml(i, period)).join('');
  const chartsHtml = (secData.charts || []).map(inst => {
    const id = `chart-${key}-${inst.symbol.replace(/[^a-zA-Z0-9]/g,'_')}`;
    const chgPeriod = inst.changes?.[period];
    const cls = pctClass(chgPeriod);
    return `<div class="chart-card">
      <div class="chart-head">
        <div class="ct">${inst.label}</div>
        <div class="cv ${cls}">${fmtPct(chgPeriod)} <span class="cv-sub">${period}</span></div>
      </div>
      <div class="cbox"><canvas id="${id}"></canvas></div>
    </div>`;
  }).join('');
  return `<div class="section">
    <div class="section-head">
      <div class="section-label">${title}</div>
      <div class="section-commentary">${secData.commentary || ''}</div>
    </div>
    <div class="tiles">${tiles}</div>
    <div class="charts-grid">${chartsHtml}</div>
  </div>`;
}

function renderPatrimony(p, period) {
  if (!p) return '';
  const chg = p.changes?.[period];
  const cls = pctClass(chg);
  const eurVal = p.current_eur;
  const chgEur = chg != null ? Math.round(eurVal * chg / 100) : null;
  const chgEurStr = chgEur != null ? (chgEur > 0 ? '+' : '') + '€' + Math.abs(chgEur).toLocaleString('en-GB') : '—';
  return `<div class="patrimony">
    <div class="pat-label">Estimated patrimony value · 6.0M€ baseline (CHF 55% / EUR 40% / USD 5%)</div>
    <div class="pat-main">
      <div class="pat-value">€ ${eurVal.toLocaleString('en-GB')}</div>
      <div class="pat-change ${cls}">${fmtPct(chg)} <span style="color:var(--text3);font-weight:400">·</span> ${chgEurStr} <span style="color:var(--text3);font-size:11px">${period}</span></div>
    </div>
    <div class="pat-detail">
      Components: <span style="color:var(--text2)">CHF ${p.chf_amount?.toLocaleString('en-GB')}</span> · <span style="color:var(--text2)">EUR ${p.eur_amount?.toLocaleString('en-GB')}</span> · <span style="color:var(--text2)">USD ${p.usd_amount?.toLocaleString('en-GB')}</span>
    </div>
  </div>`;
}

function renderNews(news) {
  if (!news || !news.length) return '<div style="color:var(--text3);font-family:var(--mono);font-size:12px">No headlines available</div>';
  return news.map((h, i) => {
    const dateStr = h.date ? new Date(h.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    const desc = h.description ? h.description.replace(/<[^>]+>/g,'').slice(0, 250) : '';
    return `<div class="news-item">
      <div class="news-head" onclick="toggleNews(${i})">
        <div class="news-num">${(i+1).toString().padStart(2,'0')}</div>
        <div class="news-main">
          <div class="news-title">${h.link ? `<a href="${h.link}" target="_blank" rel="noopener">${h.title}</a>` : h.title}</div>
          <div class="news-meta">
            <span class="news-cat ${h.category||''}">${h.category||''}</span>
            <span>${h.source}</span>
            ${dateStr ? `<span>· ${dateStr}</span>` : ''}
          </div>
        </div>
        <div class="news-toggle" id="news-toggle-${i}">▾</div>
      </div>
      <div class="news-body" id="news-body-${i}">
        ${desc ? `<div class="news-desc">${desc}…</div>` : ''}
        ${h.link ? `<a class="news-link" href="${h.link}" target="_blank" rel="noopener">Read full article →</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleNews(i) {
  const body = document.getElementById('news-body-' + i);
  const tog  = document.getElementById('news-toggle-' + i);
  if (!body) return;
  body.classList.toggle('open');
  tog.textContent = body.classList.contains('open') ? '▴' : '▾';
}

function setPeriod(p) {
  CURRENT_PERIOD = p;
  CHART_SPAN = (p === '2Y') ? '2y' : '1y';
  document.querySelectorAll('.pbtn').forEach(b => b.classList.toggle('active', b.dataset.p === p));
  renderAll();
}

function renderAll() {
  if (!CURRENT_DATA) return;
  const d = CURRENT_DATA;
  document.getElementById('patrimony-wrap').innerHTML = renderPatrimony(d.patrimony, CURRENT_PERIOD);
  const refLabels = {
    '1D': 'vs previous close',
    'MTD': 'vs ' + (d.references?.mtd || ''),
    'QTD': 'vs ' + (d.references?.qtd || ''),
    'YTD': 'vs ' + (d.references?.ytd || ''),
    '2Y': 'vs ' + (d.references?.['2y'] || '')
  };
  document.getElementById('ref-date').textContent = refLabels[CURRENT_PERIOD] || '';
  const sectionsHtml = [
    renderSection('fx',      'FX — CHF & USD in EUR',  d.sections?.fx,      CURRENT_PERIOD),
    renderSection('indices', 'Global indices',          d.sections?.indices, CURRENT_PERIOD),
    renderSection('energy',  'Energy & commodities',    d.sections?.energy,  CURRENT_PERIOD),
    renderSection('crypto',  'Metals & crypto',         d.sections?.crypto,  CURRENT_PERIOD),
    renderSection('rates',   'Rates & risk',            d.sections?.rates,   CURRENT_PERIOD),
  ].join('');
  document.getElementById('sections-wrap').innerHTML = sectionsHtml;
  setTimeout(() => {
    ['fx','indices','energy','crypto','rates'].forEach(key => {
      const sec = d.sections?.[key];
      if (!sec?.charts) return;
      sec.charts.forEach(inst => {
        const id = `chart-${key}-${inst.symbol.replace(/[^a-zA-Z0-9]/g,'_')}`;
        drawChart(id, inst);
      });
    });
  }, 30);
  document.getElementById('news').innerHTML = renderNews(d.news);
}

async function loadData() {
  st('Loading…', 'ld');
  document.getElementById('patrimony-wrap').innerHTML = '<div class="patrimony"><div class="pat-label sk" style="height:10px;width:300px;margin-bottom:14px"></div><div class="pat-value sk" style="height:34px;width:280px"></div></div>';
  document.getElementById('sections-wrap').innerHTML = '';
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('data.json not found — workflow may not have run yet');
    const d = await res.json();
CURRENT_DATA = d;
    document.getElementById('ts').textContent = d.updated || '—';
    updateAge();
    renderAll();
    st('Data loaded — ' + (d.updated || ''), 'ok');
  } catch(e) {
    st('Error: ' + e.message, 'er');
    document.getElementById('patrimony-wrap').innerHTML = `<div class="eb">${e.message}</div>`;
  }
}

function updateAge() {
  if (!CURRENT_DATA) return;
  const el = document.getElementById('age');
  if (!el) return;
  const age = dataAge(CURRENT_DATA.updated);
  el.textContent = age ? '· ' + age : '';
  el.className = ageClass(CURRENT_DATA.updated);
}

// Update age indicator every 60s
setInterval(updateAge, 60000);

// Auto-reload data every 15 min to pick up fresh data.json
setInterval(loadData, 15 * 60 * 1000);

loadData();
</script>
</body>
</html>

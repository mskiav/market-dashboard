name: Fetch market data

on:
  schedule:
    - cron: '*/15 * * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch data
        run: python fetch_data.py

      - name: Check if email time
        id: check_time
        run: |
          HOUR=$(date -u +%H)
          echo "UTC hour: $HOUR"
          if [ "$HOUR" = "06" ] || [ "$HOUR" = "07" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "13" ] || [ "$HOUR" = "18" ] || [ "$HOUR" = "19" ]; then
            echo "send_email=true" >> $GITHUB_OUTPUT
          else
            echo "send_email=false" >> $GITHUB_OUTPUT
          fi

      - name: Send email report
        if: steps.check_time.outputs.send_email == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python send_report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Market data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git fetch origin main
          git checkout main
          git reset --hard HEAD
          git push origin main --force-with-lease
